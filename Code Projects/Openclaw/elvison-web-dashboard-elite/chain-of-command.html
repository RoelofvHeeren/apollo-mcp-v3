<!DOCTYPE html>
<html class="h-full" lang="en">
<head>
<link rel="stylesheet" href="css/animated-bg.css">
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Chain of Command - Mission Control</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { background: #0a0a0a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
.sidebar { background: rgba(255, 255, 255, 0.98); width: 280px; border-right: 1px solid rgba(0,0,0,0.08); }
.card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; transition: all 0.3s ease; }
.card:hover { background: rgba(255, 255, 255, 0.06); border-color: rgba(19, 145, 135, 0.3); }
.progress-fill { background: linear-gradient(90deg, #139187, #17a598); height: 100%; border-radius: 4px; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 50; display: none; align-items: center; justify-content: center; }
.modal-overlay.active { display: flex; }
.modal-content { background: #0a0a0a; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; width: 90%; max-width: 800px; max-height: 90vh; overflow-y: auto; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
</style>
</head>
<body class="h-full flex antialiased text-slate-200">

<aside class="sidebar flex-shrink-0 flex flex-col h-full">
    <div class="p-6 border-b border-black/5 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <div class="w-8 h-8 bg-black rounded-lg flex items-center justify-center text-white font-bold text-sm">E</div>
            <span class="font-bold tracking-wider text-sm text-slate-800">ELVISON CLAW</span>
        </div>
    </div>
    <nav class="flex-1 p-4 space-y-1">
        <a href="index.html" class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-all">
            <svg class="w-5 h-5 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2"/></svg>
            <span>Dashboard</span>
        </a>
        <a href="command-center.html" class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-all">
            <svg class="w-5 h-5 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9.75 17L9 21h6l-.75-4M3 13h18" stroke-width="2"/></svg>
            <span>Command Center</span>
        </a>
        <a href="chain-of-command.html" class="flex items-center px-4 py-3 rounded-xl bg-teal-50 text-teal-700 border border-teal-200">
            <svg class="w-5 h-5 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7" stroke-width="2"/></svg>
            <span class="font-medium">Chain of Command</span>
        </a>
        <a href="operations.html" class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-all">
            <svg class="w-5 h-5 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2z" stroke-width="2"/></svg>
            <span>Operations</span>
        </a>
        <a href="integrations.html" class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-all">
            <svg class="w-5 h-5 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" stroke-width="2"/></svg>
            <span>Integrations</span>
        </a>
        <a href="agent-chat.html" class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-all">
            <svg class="w-5 h-5 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" stroke-width="2"/></svg>
            <span>Agent Chat</span>
        </a>
    </nav>
</aside>

<main class="flex-1 flex flex-col h-full overflow-hidden">
    <header class="px-8 py-6">
        <h1 class="text-2xl font-light text-white">Chain of Command</h1>
        <p class="text-slate-500 text-sm">Agent hierarchy and organizational structure</p>
    </header>
    
    <div class="flex-1 p-8 overflow-y-auto">
        <div class="max-w-5xl mx-auto" id="hierarchy"></div>
    </div>
</main>

<div id="agent-modal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-content p-6" onclick="event.stopPropagation()">
        <div class="flex justify-between items-start mb-6">
            <div class="flex items-center space-x-4">
                <div id="modal-avatar" class="w-16 h-16 rounded-2xl bg-slate-800 flex items-center justify-center text-2xl font-bold text-slate-300"></div>
                <div>
                    <h2 id="modal-name" class="text-2xl font-semibold text-white"></h2>
                    <p id="modal-role" class="text-teal-400"></p>
                </div>
            </div>
            <button onclick="closeModal()" class="text-slate-400 hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2"/></svg>
            </button>
        </div>
        
        <div class="grid grid-cols-3 gap-6">
            <div class="card p-4">
                <h3 class="text-sm font-semibold text-slate-400 uppercase mb-4">Task History</h3>
                <div class="space-y-3">
                    <div><p class="text-xs text-slate-500 mb-1">Completed</p><p id="modal-completed" class="text-lg font-semibold text-white">0</p></div>
                    <div><p class="text-xs text-slate-500 mb-1">Active</p><p id="modal-active" class="text-lg font-semibold text-teal-400">0</p></div>
                    <div><p class="text-xs text-slate-500 mb-1">Scheduled</p><p id="modal-scheduled" class="text-lg font-semibold text-blue-400">0</p></div>
                </div>
            </div>
            
            <div class="card p-4">
                <h3 class="text-sm font-semibold text-slate-400 uppercase mb-4">System Report</h3>
                <div class="space-y-3">
                    <div class="flex justify-between"><span class="text-sm text-slate-500">Status</span><span id="modal-status" class="text-sm font-medium"></span></div>
                    <div class="flex justify-between"><span class="text-sm text-slate-500">Uptime</span><span class="text-sm font-medium text-slate-300">2h 34m</span></div>
                    <div class="mt-4 p-3 bg-white/5 rounded-lg"><p id="modal-current-task" class="text-sm text-slate-400">No active task</p></div>
                </div>
            </div>
            
            <div class="card p-4">
                <h3 class="text-sm font-semibold text-slate-400 uppercase mb-4">Agent Info</h3>
                <div class="space-y-3">
                    <div class="flex justify-between"><span class="text-sm text-slate-500">Model</span><span id="modal-model" class="text-sm font-medium text-slate-300"></span></div>
                    <div><p class="text-sm text-slate-500 mb-2">Responsibilities</p><div id="modal-responsibilities" class="flex flex-wrap gap-2"></div></div>
                    <button onclick="chatWithAgent()" class="w-full bg-teal-500 hover:bg-teal-600 text-white font-semibold py-2 rounded-lg transition-all mt-4">Chat with Agent</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let currentAgent = null;

async function loadData() {
    const res = await fetch('data/organization.json?t=' + Date.now());
    const data = await res.json();
    renderHierarchy(data.hierarchy);
}

function renderHierarchy(h) {
    const container = document.getElementById('hierarchy');
    container.innerHTML = `
        <div class="text-center mb-8">${renderCard(h.projectManager, 'xl')}</div>
        <div class="flex justify-center gap-8 mb-8">${renderCard(h.chiefOfStaff, 'lg')}${renderCard(h.chiefOfFinance, 'lg')}</div>
        <div class="grid grid-cols-2 gap-8">${h.departments.map(d => renderDept(d)).join('')}</div>
    `;
}

function renderCard(agent, size) {
    const progress = Math.round(agent.taskProgress);
    const isWorking = progress > 0;
    return `
        <div class="card ${size === 'xl' ? 'p-6 w-80' : 'p-5 w-72'} cursor-pointer" onclick="showAgentDetails('${agent.id}')">
            <div class="flex items-start justify-between mb-3">
                <div class="flex items-center space-x-4">
                    <div class="w-14 h-14 rounded-xl bg-slate-800 flex items-center justify-center text-lg font-bold text-slate-300">${agent.avatar}</div>
                    <div>
                        <h3 class="font-semibold text-white text-lg">${agent.name}</h3>
                        <p class="text-xs text-teal-400 uppercase tracking-wider">${agent.role}</p>
                        <p class="text-xs text-slate-500">${agent.model}</p>
                    </div>
                </div>
                <span class="w-2.5 h-2.5 rounded-full ${isWorking ? 'bg-teal-400' : 'bg-slate-600'}"></span>
            </div>
            ${isWorking ? `
                <div class="mt-4">
                    <div class="flex justify-between text-xs mb-1"><span class="text-slate-500 truncate">${agent.currentTask}</span><span class="text-teal-400 font-mono">${progress}%</span></div>
                    <div class="w-full bg-white/5 h-2 rounded-full overflow-hidden"><div class="progress-fill" style="width: ${progress}%"></div></div>
                </div>
            ` : '<p class="text-xs text-slate-600 mt-2 italic">Idle</p>'}
        </div>
    `;
}

function renderDept(dept) {
    return `
        <div class="card p-5">
            <div class="flex items-center space-x-3 mb-4 pb-4 border-b border-white/5">
                <div class="w-12 h-12 rounded-xl bg-slate-800 flex items-center justify-center font-bold text-slate-300">${dept.manager.avatar}</div>
                <div>
                    <h3 class="font-semibold text-white">${dept.name}</h3>
                    <p class="text-xs text-teal-400">${dept.manager.name}</p>
                </div>
            </div>
            <div class="space-y-3">
                ${dept.agents.map(a => `
                    <div class="card p-3 flex justify-between items-center cursor-pointer" style="background: rgba(255,255,255,0.02);" onclick="showAgentDetails('${a.id}')">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 rounded-lg bg-slate-800 flex items-center justify-center text-sm font-bold text-slate-300">${a.avatar}</div>
                            <span class="text-sm text-slate-300">${a.name}</span>
                        </div>
                        <span class="w-2 h-2 rounded-full ${a.status === 'working' ? 'bg-teal-400' : 'bg-slate-600'}"></span>
                    </div>
                `).join('')}
            </div>
        </div>
    `;
}

async function showAgentDetails(agentId) {
    const res = await fetch('data/organization.json?t=' + Date.now());
    const data = await res.json();
    let agent = findAgent(data.hierarchy, agentId);
    if (!agent) return;
    currentAgent = agent;
    document.getElementById('modal-avatar').textContent = agent.avatar;
    document.getElementById('modal-name').textContent = agent.name;
    document.getElementById('modal-role').textContent = agent.role;
    document.getElementById('modal-model').textContent = agent.model;
    document.getElementById('modal-status').textContent = agent.status;
    document.getElementById('modal-status').className = 'text-sm font-medium ' + (agent.status === 'working' ? 'text-teal-400' : 'text-slate-500');
    document.getElementById('modal-current-task').textContent = agent.currentTask || 'No active task';
    document.getElementById('modal-completed').textContent = Math.floor(Math.random() * 10);
    document.getElementById('modal-active').textContent = agent.status === 'working' ? 1 : 0;
    document.getElementById('modal-scheduled').textContent = Math.floor(Math.random() * 3);
    document.getElementById('modal-responsibilities').innerHTML = agent.responsibilities.map(r => `<span class="text-xs bg-white/5 px-2 py-1 rounded text-slate-400">${r}</span>`).join('');
    document.getElementById('agent-modal').classList.add('active');
}

function findAgent(h, id) {
    if (h.projectManager.id === id) return h.projectManager;
    if (h.chiefOfStaff.id === id) return h.chiefOfStaff;
    if (h.chiefOfFinance.id === id) return h.chiefOfFinance;
    for (const dept of h.departments) {
        if (dept.manager.id === id) return dept.manager;
        for (const agent of dept.agents) if (agent.id === id) return agent;
    }
    return null;
}

function closeModal(event) {
    if (!event || event.target.id === 'agent-modal') {
        document.getElementById('agent-modal').classList.remove('active');
    }
}

function chatWithAgent() {
    if (currentAgent) {
        window.location.href = `agent-chat.html?agentId=${currentAgent.id}`;
    }
}

loadData();
</script>
</body>
</html>
